services:
  - type: web
    name: chatshare-api
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: CORS_ORIGINS
        # Add your Vercel URL here e.g. https://chatapp-xyz.vercel.app
        sync: false
      - key: CORS_ORIGIN_REGEX
        # Allows ALL *.vercel.app subdomains (preview + production)
        value: "https://.*\\.vercel\\.app"
      - key: UPLOAD_DIR
        value: "/tmp/uploads"
      - key: MAX_FILE_SIZE_MB
        value: "50"
      - key: DEBUG
        value: "false"
